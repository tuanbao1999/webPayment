<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>Forms</title>
  </head>
  <body>
    <form name="expense" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="expense" />
      <p class="hidden">
        <label>Don’t fill this out: <input name="bot-field" /></label>
      </p>
      <input name="expense-date" />
      <input name="description" />
      <input name="total-amount" />
      <input name="split-mode" />
      <input name="headcount" />
      <input name="default-tier" />
      <input name="participants" />
      <input name="amounts-json" />
      <input name="frequent-group" />
    </form>
  </body>
</html>
