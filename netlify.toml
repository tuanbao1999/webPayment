[build]
  command = "npm run build"
  # Phải khác thư mục gốc repo — đừng đặt publish = "/" trên Netlify UI
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"
  # BẮT BUỘC: thêm DATABASE_URL trong Netlify UI (không ghi password vào file này)
  # Project configuration → Environment variables → postgresql://...?sslmode=require
  # Scopes: Build + Runtime (All deploy contexts)

[functions]
  directory = "netlify/functions"
