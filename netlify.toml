[build]
  command = "npm run build"
  # Phải khác thư mục gốc repo — đừng đặt publish = "/" trên Netlify UI
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  DATABASE_URL = "file:./prisma/dev.db"
  # Không bỏ devDependencies khi build (cần prisma, eslint, plugin...)
  NPM_FLAGS = "--include=dev"

[functions]
  directory = "netlify/functions"
