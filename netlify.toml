[build]
  command = "npm run build"
  # Phải khác thư mục gốc repo — đừng đặt publish = "/" trên Netlify UI
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  # DATABASE_URL + TURSO_AUTH_TOKEN: đặt trong Netlify UI (Turso), không dùng file SQLite
  NPM_FLAGS = "--include=dev"

[functions]
  directory = "netlify/functions"
